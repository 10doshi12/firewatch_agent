# config.yaml — FirewatchEnv Training Pipeline Configuration
# Consumed by sft/train.py and downstream modules.
# Repo IDs are constructed at call time: <hf_namespace>/<repo-role-suffix>

hf_namespace: null  # falls back to HF_NAMESPACE env var or authenticated HF username
# Baseline / GRPO: use local env on training host, e.g. "http://127.0.0.1:8000"
sim_env_url: "https://10doshi12-firewatch-env.hf.space"

sft:
  # Unsloth is mandatory for SFT (4-bit + LoRA). Preflight and training raise if import fails.
  # paired_15: 15 Hub training ids (0..14), each step uses 2 data files; weights are
  # always incremental (each run continues LoRA+GNN from the previous Hub save).
  # legacy_30: 30 one-file steps, same incremental rule per data batch 0..29.
  campaign: paired_15
  # Optional: set >1 with MAX_SFT_STEPS env to train multiple steps per process.
  max_sft_steps_per_invocation: 1
  # 14B profile tuned for Colab/Kaggle VRAM constraints.
  base_model: "unsloth/Qwen2.5-14B-Instruct-bnb-4bit"
  # Used by shared/model_runtime helpers in edge cases; SFT/GRPO/baseline do not use dense fallback.
  fallback_base_model: "Qwen/Qwen2.5-3B-Instruct"
  max_seq_length: 1536
  lora_rank: 16
  lora_alpha: 16
  lora_dropout: 0.0
  lora_target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  llm_epochs_per_batch: 5
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-5
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  max_prompt_length: 1024
  max_completion_length: 256
  optimizer: "adamw_8bit"
  fallback_optimizer: "adamw_torch"
  baseline_sim_episodes: 60
  # Local FastAPI sim_env URL inside the HF Space (start.sh launches the env on
  # 127.0.0.1:8000 in its own venv). FIREWATCH_SIM_URL env var wins if set.
  baseline_sim_url: "http://127.0.0.1:8000"
  # After each post-SFT baseline, compare to previous Hub metrics; optional override file.
  regression_guard: true
  regression_min_delta_success_rate: 0.0
  regression_min_delta_mean_reward: 0.0

gnn:
  hidden_dim: 64
  num_layers: 2
  dropout: 0.1
  learning_rate: 1.0e-3
  max_epochs: 250
  patience: 10
  in_channels: 32  # 21 ServiceMetrics + 3 status one-hot + 8 Phase 2/3 fields

grpo:
  num_generations: 8
  base_seed: 1000
  learning_rate: 1.0e-5
  num_train_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  max_prompt_length: 2048
  max_completion_length: 256
  max_grad_norm: 0.1
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  optimizer: "adamw_8bit"
  fallback_optimizer: "adamw_torch"
  save_steps: 50
